services:
  api:
    build: .
    container_name: ai-sales-insights-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app
    depends_on:
      - db

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:17

    env_file:
      - .env

    container_name: ai-sales-insights-db

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: