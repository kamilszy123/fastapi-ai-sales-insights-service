name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      APP_NAME: sales-insights-service
      DATABASE_URL: postgresql://ci:ci@localhost/ci
      ALEMBIC_DATABASE_URL: postgresql://ci:ci@localhost/ci
      SECRET_KEY: ci-dummy-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      OPENAI_API_KEY: sk-ci-dummy-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
